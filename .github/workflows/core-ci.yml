name: Core CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check tracked JavaScript syntax
        run: npm run check

      - name: Run unit tests
        run: npm test
